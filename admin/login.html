<title>Connexion — ALL STAR LOC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Outfit',system-ui,sans-serif;background:#08080a;
  display:flex;align-items:center;justify-content:center;min-height:100vh;}
/* Fond avec halo rouge */
.bg{position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 65% 5%, rgba(196,30,58,.22) 0%, transparent 65%),
    radial-gradient(ellipse 50% 60% at 5% 95%, rgba(196,30,58,.12) 0%, transparent 55%),
    #08080a;}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;}
.card{background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;padding:42px 38px;
  box-shadow:0 40px 80px rgba(0,0,0,.55);}
/* Logo */
.logo-wrap{text-align:center;margin-bottom:34px;}
.logo-wrap img{display:block;margin:0 auto 10px;}
.logo-divider{width:36px;height:2px;background:#C41E3A;border-radius:1px;margin:10px auto 10px;}
.logo-sub{font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;
  letter-spacing:2px;font-weight:600;}
/* Champs */
.fg{margin-bottom:16px;}
.fg label{display:block;font-size:10.5px;font-weight:700;color:rgba(255,255,255,.38);
  text-transform:uppercase;letter-spacing:.9px;margin-bottom:7px;}
.fg input{width:100%;background:rgba(255,255,255,.055);
  border:1.5px solid rgba(255,255,255,.09);border-radius:11px;
  padding:13px 16px;font-size:14px;color:#fff;font-family:inherit;
  outline:none;transition:border-color .18s, background .18s;}
.fg input:focus{border-color:rgba(196,30,58,.55);background:rgba(255,255,255,.08);}
.fg input::placeholder{color:rgba(255,255,255,.18);}
/* Bouton */
.btn{width:100%;margin-top:6px;
  background:linear-gradient(135deg,#C41E3A 0%,#a01530 100%);
  color:#fff;border:none;border-radius:11px;padding:14px;
  font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  box-shadow:0 4px 20px rgba(196,30,58,.35);
  transition:transform .15s, box-shadow .15s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 7px 28px rgba(196,30,58,.5);}
.btn:active{transform:none;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
/* Erreur */
.err{background:rgba(196,30,58,.12);border:1px solid rgba(196,30,58,.22);
  color:#ff7088;border-radius:9px;padding:11px 14px;font-size:13px;
  font-weight:600;margin-bottom:16px;text-align:center;display:none;}
.footer{text-align:center;margin-top:22px;font-size:11px;color:rgba(255,255,255,.16);letter-spacing:.4px;}
@media(max-width:440px){.card{padding:30px 22px;} .wrap{padding:14px;}}
</style>
</head>

    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:u,pass:p})});
    const d=await r.json();
    if(r.ok&&d&&d.ok){
      // Session validée par le serveur
      const sess={user:d.user,exp:d.exp||Date.now()+TTL,token:d.token||Math.random().toString(36).slice(2)};
      if(d.adminKey)sess.adminKey=d.adminKey;
      localStorage.setItem(SK,JSON.stringify(sess));
      if(d.adminKey){try{localStorage.setItem('asl_admin_key',d.adminKey);}catch(e){}}
      localStorage.removeItem(LK);
      window.location.replace('index.html');
      return;
    }
    // Échec
    tries++;
    if(tries>=MAX){localStorage.setItem(LK,String(Date.now()+BAN));showErr('Trop de tentatives. Accès bloqué 15 min.');}
    else showErr('Identifiant ou mot de passe incorrect. '+(MAX-tries)+' tentative(s) restante(s).');
    document.getElementById('p').value='';
    document.getElementById('p').focus();
    if(btn)btn.disabled=false;
  }catch(e){
    // Pas de réseau / test local (file://) : message clair
    showErr('Connexion au serveur impossible. En local, l\'authentification fonctionne uniquement une fois déployé sur Cloudflare.');
    if(btn)btn.disabled=false;
  }
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}
locked();
</script>
